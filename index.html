<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>VN RunClub - Vượt Qua Giới Hạn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #ffffff;
        color: #09090b;
        overflow-x: hidden;
      }
      h1, h2, h3, .font-display {
        font-family: 'Oswald', sans-serif;
        text-transform: uppercase;
      }
      
      /* Athletic specific styles */
      .skew-container {
        transform: skewX(-8deg);
      }
      .skew-content {
        transform: skewX(8deg);
      }
      .athletic-border {
        border: 4px solid #09090b;
      }
      .athletic-shadow {
        box-shadow: 6px 6px 0px #09090b;
      }
      .athletic-shadow-hover:hover {
        box-shadow: 2px 2px 0px #09090b;
        transform: translate(4px, 4px);
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #f4f4f5; 
        border-left: 2px solid #09090b;
      }
      ::-webkit-scrollbar-thumb {
        background: #09090b; 
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #ff4600; 
      }

      /* Marquee Animation */
      .marquee-track {
        display: flex;
        animation: marquee 20s linear infinite;
      }
      @keyframes marquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }

      /* Grid Pattern */
      .bg-grid {
        background-size: 40px 40px;
        background-image: linear-gradient(to right, #e4e4e7 1px, transparent 1px),
                          linear-gradient(to bottom, #e4e4e7 1px, transparent 1px);
      }
      
      /* Track Lines */
      .track-lines {
        background: repeating-linear-gradient(
          90deg,
          transparent,
          transparent 20px,
          #e4e4e7 20px,
          #e4e4e7 22px
        );
      }
    </style>

}
