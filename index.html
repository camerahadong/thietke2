<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>VN RunClub - Kết nối đam mê</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
      }
      h1, h2, h3, .font-display {
        font-family: 'Oswald', sans-serif;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }

      /* Animations */
      .animate-fade-in { animation: fadeIn 0.8s ease-out forwards; }
      .animate-bounce-slow { animation: bounce 3s infinite; }
      
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Podium specific styles */
      .podium-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
      .podium-1 { z-index: 10; transform: scale(1.05); border-top: 4px solid #EAB308; background: linear-gradient(to bottom, #FEFCE8, #ffffff); }
      .podium-2 { border-top: 4px solid #94A3B8; background: linear-gradient(to bottom, #F8FAFC, #ffffff); }
      .podium-3 { border-top: 4px solid #B45309; background: linear-gradient(to bottom, #FFF7ED, #ffffff); }
      
      @media (min-width: 768px) {
        .podium-1:hover { transform: scale(1.08) translateY(-10px); box-shadow: 0 20px 25px -5px rgba(234, 179, 8, 0.1); }
      }
      
      .bg-pattern {
        background-color: #0f172a;
        background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%231e293b' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      }
    </style>
